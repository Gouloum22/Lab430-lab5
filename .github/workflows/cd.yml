name: CD - Store Manager

on:
  workflow_run:
    workflows: ["CI - Store Manager"]
    types:
      - completed
  workflow_dispatch:

jobs:
  cd:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "DB_HOST=mysql" > .env
          echo "DB_PORT=3306" >> .env
          echo "DB_USER=labo05" >> .env
          echo "DB_PASSWORD=labo05" >> .env
          echo "DB_NAME=labo05_db" >> .env
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_DB=0" >> .env
          echo "KAFKA_HOST=labo7-seulement!" >> .env

      - name: Create Docker network
        run: docker network create labo05-network || true

      - name: Deploy Store Manager
        run: |
          docker-compose down
          docker-compose up -d --build

      - name: Show deployment containers
        run: docker ps
